name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python
        run: python -m compileall -q scripts tests
      - name: Install official Agent Skills validator
        if: matrix.python-version != '3.9'
        run: python -m pip install skills-ref==0.1.1
      - name: Validate with official Agent Skills validator
        if: matrix.python-version != '3.9'
        run: agentskills validate "$PWD"
      - name: Validate with dependency-free repository validator
        run: python scripts/validate_skill.py .
      - name: Run tests
        run: python -m unittest discover -s tests -v
